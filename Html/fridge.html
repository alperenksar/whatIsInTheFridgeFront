<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/homePage.css">
    
    <title>Home Page</title>
</head>
<body>
    <header class="navbar">
        <div class="logo">What is in the<span class="gold"> FRIDGE</span></div>
        <nav>
            <ul>
                <li><a href="../index.html">HOME</a></li>
                <li><a href="../Html/fridge.html">FRIDGE</a></li>
                <li><a href="../Html/freezer.html">FREEZER</a></li>
                <li><a href="../Html/buy-list.html">BUY LIST</a></li>
            </ul>
        </nav>
        <div class="nav-right">
            <div class="search-box">
                <input type="text" placeholder="Search...">
            </div>
            <button class="login-btn">LOGIN</button>
        </div>
    </header>

    <main class="container">
        <div class="section-header used">
            <h1><span>ALL</span> ITEMS</h1>
        </div>
        <div class="role-tabs-nav">
            <ul>
				<li class="role-item" >
					<button id="1-tab" class="role active">Dairy & Eggs</button>
				</li>

				<li class="role-item" >
					<button id="2-tab" class="role">Breakfast & Snacks</button>
				</li>

                <li class="role-item" >
					<button id="3-tab" class="role">Meats</button>
				</li>

				<li class="role-item">
					<button id="4-tab" class="role">Fruits & Vegetables</button>
				</li>

				<li class="role-item">
					<button id="5-tab" class="role">Sauces & Condiments</button>
				</li>

                <li class="role-item">
					<button id="6-tab" class="role">Ready Meals & Beverages</button>
				</li>
			</ul>
        </div>
           

        <div class="item-gallery" id="item-grid">
            <div class="item-card">
                <div class="card-img">
                    <img src="https://i0.wp.com/post.healthline.com/wp-content/uploads/2020/03/romaine-lettuce-1296x728-body.jpg?w=1155&h=1528" alt="Lettuce">
                    <div class="expiry-date">2026-11-07</div>
                </div>
                <h3>Lettuce</h3>
                <p class="category">Tesco Lettuce</p>
            </div>

            <div class="item-card">
                <div class="card-img">
                    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQE_TaCRUyCB-UmltWmo1YV8uGcgWiCV6QqCQ&s" alt="Onion">
                    <div class="expiry-date">2026-11-07</div>
                </div>
                <h3>Onion</h3>
                <p class="category">Brown Onion</p>
            </div>

        </div>
    </main>

    <footer>
        Copyright 2026
    </footer>

    <script type="module" src="../Js/fridge.js"></script>
    
    
    
    
</body>
</html>
