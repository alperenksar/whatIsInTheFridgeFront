<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Collection | Add Item</title>
    <link rel="stylesheet" href="../AdminCss/global.css">
    <link rel="stylesheet" href="../AdminCss/addItem.css">
</head>
<body class="dark-theme">
    <div class="add-container">
        <div class="add-card">
            <header class="card-header">
                <h2>Add New Item</h2>
                <p>Add a new item to your fridge inventory</p>
            </header>

            <form id="add-item-form">
                <div class="input-group">
                    <label for="name">Name</label>
                    <div class="name-with-preview">
                        <input type="text" id="name" placeholder="Enter name (e.g. Milk)" required>        
                    </div>
                </div>

                <div class="input-group">
                    <label for="description">Description</label>
                    <div class="name-with-preview">
                        <input type="text" id="description" placeholder="Enter description (e.g. Tesco)" required>        
                    </div>
                </div>

                <div class="input-group">
                    <label for="image">Image Url</label>
                    <div class="name-with-preview">
                        <input type="text" id="image" placeholder="Enter image Url" required>        
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="category">Category</label>
                        <select id="category">
                            <option value="Dairy & Eggs">Dairy & Eggs</option>
                            <option value="Breakfast & Snacks">Breakfast & Snacks</option>
                            <option value="Meats">Meats</option>
                            <option value="Fruits & Vegetables">Fruits & Vegetables</option>
                            <option value="Sauces & Condiments">Sauces & Condiments</option>
                            <option value="Ready Meals & Beverages">Ready Meals & Beverages</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="quantity">Quantity</label>
                        <input type="number" id="quantity" placeholder="0" required>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="unit">Unit</label>
                        <select id="unit">
                            <option value="pcs">Pcs</option>
                            <option value="kg">KG</option>
                            <option value="liter">Liter</option>
                            <option value="pack">Pack</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="expiry">Expiry Date</label>
                        <input type="date" id="expiry">
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group">
                        <label for="price">Price</label>
                        <input type="number" id="price" placeholder="0">
                        
                    </div>
                    <div class="input-group">
                        <label for="owner">Owner Id</label>
                        <input type="number" id="owner" placeholder="0">
                    </div>
                   
                </div>

                    <form id="add-item-form">
                        <button type="submit" class="btn-primary" id="add-item-btn">ADD COLLECTION</button>
                    </form>
            </form>
        </div>
    </div>

    <script type="module" src="../AdminJs/addItem.js"></script>
</body>
</html>
