<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Fridge</title>
    
    <link rel="stylesheet" href="../AdminCss/admin.css">
</head>
<body class="dark-theme">
    <div class="dashboard-container">
        
        <header class="navbar">
            <div class="nav-left">
                <div class="logo-box">My Fridge</div>
                <h1 class="page-title">Dashboard</h1>
            </div>
            <div class="nav-right">
                <div class="user-profile">
                    <span class="username">Admin User</span>
                </div>
            </div>
        </header>

        <section class="action-bar">
            <div class="tabs">
                <button class="tab-item active">All Items</button>
                <button class="tab-item">Get Soon Expiry Date</button>
                <button class="tab-item">Get All Users</button>
            </div>
            <button class="btn-primary" onclick="window.location.href='addItem.html'">NEW ITEM</button>
        </section>

        <section class="filter-bar">
            <div class="search-wrapper">
                
                <input type="text" id="search-box" placeholder="Search...">
            </div>
            
        </section>

        <main class="items-grid" id="items-grid">
            <p class="loading-text">Loading...</p>
        </main>

    </div>

    <script src="../AdminJs/admin.js"></script>
</body>
</html>
